version: '3.8'

services:
  afriq-site:
    image: ${DOCKER_USERNAME:-yourusername}/afriq-site:latest
    container_name: afriq-site
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - afriq-network

networks:
  afriq-network:
    driver: bridge
